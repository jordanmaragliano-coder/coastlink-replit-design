kind = "web"
previewPath = "/"
title = "CoastLink"
version = "1.0.0"
id = "artifacts/coastlink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22640

[services.development]
run = "pnpm --filter @workspace/coastlink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coastlink", "run", "build" ]
publicDir = "artifacts/coastlink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22640"
BASE_PATH = "/"
